name: Daily Stock Scan

on:
  push:
    branches: [main]
  schedule:
    # US Market (NYSE/NASDAQ)
    # Scan 1: 15:00 UTC Mon-Fri = 8:30 PM IST = 11:00 AM EST (1.5hr after open)
    - cron: '0 15 * * 1-5'
    # Scan 2: 19:30 UTC Mon-Fri = 1:00 AM IST = 3:30 PM EST (30min before close)
    - cron: '30 19 * * 1-5'
    # Indian Market (NSE)
    # Scan 3: 05:00 UTC Mon-Fri = 10:30 AM IST (1hr after open)
    - cron: '0 5 * * 1-5'
    # Scan 4: 09:30 UTC Mon-Fri = 3:00 PM IST (30min before close)
    - cron: '30 9 * * 1-5'
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to scan'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - us
          - india

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run strategy performance tests
        run: python test_strategy.py

  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process Telegram trade commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "from trade_tracker import check_telegram_trades; check_telegram_trades()"

      - name: Determine which market to scan
        id: market
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "market=${{ inputs.market || 'both' }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge 14 ] && [ "$HOUR" -le 20 ]; then
            echo "market=us" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge 4 ] && [ "$HOUR" -le 10 ]; then
            echo "market=india" >> $GITHUB_OUTPUT
          else
            echo "market=both" >> $GITHUB_OUTPUT
          fi

      - name: Scan US market
        if: steps.market.outputs.market == 'us' || steps.market.outputs.market == 'both'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          python main.py alerts scan-full

      - name: Scan Indian market
        if: steps.market.outputs.market == 'india' || steps.market.outputs.market == 'both'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          python main.py alerts scan-india

      - name: Check sell signals
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py portfolio sell-check

      - name: Save holdings state
        if: always()
        run: |
          git config user.name "stock-toolkit-bot"
          git config user.email "bot@stock-toolkit"
          git add holdings.json last_telegram_update.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update holdings from Telegram trades"
          git push || true

      - name: Upload scan results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: screener_output.csv
          retention-days: 30
