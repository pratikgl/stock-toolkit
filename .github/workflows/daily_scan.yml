name: Daily Stock Scan

on:
  schedule:
    # Scan 1: 14:00 UTC Mon-Fri = 7:30 PM IST = 10:00 AM EST (market open)
    - cron: '0 14 * * 1-5'
    # Scan 2: 19:30 UTC Mon-Fri = 1:00 AM IST = 3:30 PM EST (before close)
    - cron: '30 19 * * 1-5'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full S&P 500 scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          python main.py alerts scan-full

      - name: Upload scan results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: screener_output.csv
          retention-days: 30
