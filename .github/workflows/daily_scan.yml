name: Daily Stock Scan

on:
  schedule:
    # Scan 1: 14:00 UTC Mon-Fri = 7:30 PM IST = 10:00 AM EST (market open)
    - cron: '0 14 * * 1-5'
    # Scan 2: 19:30 UTC Mon-Fri = 1:00 AM IST = 3:30 PM EST (before close)
    - cron: '30 19 * * 1-5'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process Telegram trade commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "from trade_tracker import check_telegram_trades; check_telegram_trades()"

      - name: Run full S&P 500 scan + sell monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          python main.py alerts scan-full
          python main.py portfolio sell-check

      - name: Save holdings state
        if: always()
        run: |
          git config user.name "stock-toolkit-bot"
          git config user.email "bot@stock-toolkit"
          git add holdings.json last_telegram_update.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update holdings from Telegram trades"
          git push || true

      - name: Upload scan results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: screener_output.csv
          retention-days: 30
